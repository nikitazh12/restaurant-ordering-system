services:
  db:
    image: postgres:16-alpine
    container_name: restaurant_db
    restart: always
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=restaurant_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    container_name: restaurant_backend
    restart: always
    ports:
      - "127.0.0.1:8000:8000"
    volumes:
      - ./backend:/app/backend
      - ./backend/static:/app/backend/static
    environment:
      - DATABASE_URL=postgresql+psycopg://postgres:postgres@db:5432/restaurant_db
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: ${VITE_API_URL}
    container_name: restaurant_frontend
    restart: always
    ports:
      - "127.0.0.1:3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
